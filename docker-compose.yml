version: '3.9'

# Production docker-compose — images pulled from Docker Hub
# Run locally: docker-compose up -d
# Deploy:      docker-compose pull && docker-compose up -d --remove-orphans

services:

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: seo_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}
      MONGO_INITDB_DATABASE: seo-audit-tool
    volumes:
      - mongo_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    ports:
      - "127.0.0.1:27017:27017"   # Bind to localhost only — NOT exposed publicly
    networks:
      - seo_internal
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Backend API ───────────────────────────────────────────────────────────────
  backend:
    image: ${DOCKER_USERNAME}/seo-audit-backend:${IMAGE_TAG:-latest}
    container_name: seo_backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"     # Bind to localhost — Apache2 proxies from outside
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD}@mongo:27017/seo-audit-tool?authSource=admin
      FRONTEND_URL: ${FRONTEND_URL}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-}
      GOOGLE_PAGESPEED_API_KEY: ${GOOGLE_PAGESPEED_API_KEY:-}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - seo_internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── Frontend (Nginx) ──────────────────────────────────────────────────────────
  frontend:
    image: ${DOCKER_USERNAME}/seo-audit-frontend:${IMAGE_TAG:-latest}
    container_name: seo_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"       # Bind to localhost — Apache2 proxies from outside
    depends_on:
      - backend
    networks:
      - seo_internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  mongo_data:
    driver: local

networks:
  seo_internal:
    driver: bridge
