# Apache2 Virtual Host for SEO Audit Tool
# Install: sudo cp seo-audit.conf /etc/apache2/sites-available/
# Enable:  sudo a2ensite seo-audit && sudo systemctl reload apache2
#
# Required Apache2 modules (run once):
#   sudo a2enmod proxy proxy_http proxy_wstunnel headers rewrite ssl
#   sudo systemctl restart apache2

# ── HTTP: redirect to HTTPS ───────────────────────────────────────────────────
<VirtualHost *:80>
    ServerName yourdomain.com
    ServerAlias www.yourdomain.com

    # Let's Encrypt challenge directory
    Alias /.well-known/acme-challenge/ /var/www/html/.well-known/acme-challenge/
    <Directory /var/www/html/.well-known/acme-challenge/>
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    # Redirect everything else to HTTPS
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^(.*)$ https://yourdomain.com$1 [R=301,L]
</VirtualHost>

# ── HTTPS ─────────────────────────────────────────────────────────────────────
<VirtualHost *:443>
    ServerName yourdomain.com
    ServerAlias www.yourdomain.com

    # ── SSL (managed by Certbot) ─────────────────────────────────────────────
    SSLEngine on
    SSLCertificateFile     /etc/letsencrypt/live/yourdomain.com/fullchain.pem
    SSLCertificateKeyFile  /etc/letsencrypt/live/yourdomain.com/privkey.pem
    Include                /etc/letsencrypt/options-ssl-apache.conf

    # ── Logging ──────────────────────────────────────────────────────────────
    ErrorLog  ${APACHE_LOG_DIR}/seo-audit-error.log
    CustomLog ${APACHE_LOG_DIR}/seo-audit-access.log combined

    # ── Proxy settings ───────────────────────────────────────────────────────
    ProxyRequests     Off
    ProxyPreserveHost On

    # Increase timeouts for long-running SEO audits (can take 30s+)
    ProxyTimeout 120
    Timeout      120

    # ── Route /api/* → Backend container (port 5000) ─────────────────────────
    ProxyPass        /api http://127.0.0.1:5000/api
    ProxyPassReverse /api http://127.0.0.1:5000/api

    # ── Route /* → Frontend container (port 3000) ────────────────────────────
    ProxyPass        / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # ── Security Headers ──────────────────────────────────────────────────────
    Header always set X-Content-Type-Options     "nosniff"
    Header always set X-Frame-Options            "DENY"
    Header always set X-XSS-Protection           "1; mode=block"
    Header always set Referrer-Policy            "strict-origin-when-cross-origin"
    Header always set Permissions-Policy         "geolocation=(), microphone=(), camera=()"
    Header always set Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload"

    # Remove server version header
    ServerSignature Off
</VirtualHost>
